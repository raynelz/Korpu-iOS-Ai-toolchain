project_name: "REPLACE_WITH_PROJECT_NAME"

# Swift language server для семантической навигации по iOS-коду
languages:
- swift

encoding: "utf-8"
line_ending:
language_backend:
ignore_all_files_in_gitignore: true
ls_specific_settings: {}

ignored_paths:
  - "**/.build/**"
  - "**/DerivedData/**"
  - "**/build/**"
  - "**/*.xcodeproj/**"
  - "**/*.xcworkspace/**"
  - "**/Pods/**"
  - "**/.swiftpm/**"

read_only: false
excluded_tools: []
included_optional_tools: []
fixed_tools: []
base_modes:
default_modes:
initial_prompt: ""
symbol_info_budget:
read_only_memory_patterns: []
ignored_memory_patterns: []
