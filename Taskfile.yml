version: '3'

tasks:
  default:
    # Эта задача выполняется по умолчанию при вызове 'task' без аргументов.
    # Она скрыта из списка, так как у нее нет 'desc'.
    cmds:
      - task --list
      - echo "task <name> --summary"
    silent: true

  apollo-generate:
    desc: "Generate actual graphql files"
    summary: |
      Generate graphql files

      EXAMPLE:
        ./apollo-ios-cli fetch-schema
        ./apollo-ios-cli generate
    cmds:
      - ./apollo-ios-cli fetch-schema
      - ./apollo-ios-cli generate

  agents:
    desc: "Setup Agents (run from target project, NOT from toolchain itself)"
    preconditions:
      - sh: '[ "$(basename $PWD)" != "Korpu-iOS-Ai-toolchain" ]'
        msg: "Do not run this inside Korpu-iOS-Ai-toolchain — it will overwrite the original files"
    cmds:
      - ln -sf ../Korpu-iOS-Ai-toolchain/.agents .agents
      - ln -sf ../Korpu-iOS-Ai-toolchain/AGENTS.md AGENTS.md

  agents-claude:
    desc: "Setup Agents for Claude"
    cmds:
      - echo '@AGENTS.md' > CLAUDE.md
      - mkdir -p .claude
      - ln -sf ../.agents/skills .claude/skills

  agents-codex:
    desc: "Setup Agents for Codex"
    cmds:
      - echo '@AGENTS.md' > CODEX.md